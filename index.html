  <!-- Firebase (module script, must stay inline) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDK8QW-UOElfgmNbFYslD3krgkpizTuaWg",
      authDomain: "med-test-8a03f.firebaseapp.com",
      projectId: "med-test-8a03f",
      storageBucket: "med-test-8a03f.firebasestorage.app",
      messagingSenderId: "667021400985",
      appId: "1:667021400985:web:53b688f554e78adddd5108",
      measurementId: "G-QMFYTZX5TP"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    const overlay = document.getElementById('activation-overlay');
    const btn     = document.getElementById('activate-btn');
    const status  = document.getElementById('status-msg');

    if (localStorage.getItem('medq_active') === 'true') {
      overlay.style.display = 'none';
      document.body.classList.remove('locked');
    }

    btn.onclick = async () => {
      const code = document.getElementById('activation-code').value.trim();
      if (!code) return;
      status.innerText = "Verifying code...";
      status.style.color = "#38bdf8";
      try {
        const docRef  = doc(db, "activationCodes", code);
        const docSnap = await getDoc(docRef);
        if (docSnap.exists() && docSnap.data().isUsed === false) {
          await updateDoc(docRef, { isUsed: true });
          localStorage.setItem('medq_active', 'true');
          status.innerText = "Success! Unlocking...";
          status.style.color = "#4ade80";
          setTimeout(() => {
            overlay.style.display = 'none';
            document.body.classList.remove('locked');
          }, 1000);
        } else {
          status.innerText = docSnap.exists() ? "Code already used." : "Invalid code.";
          status.style.color = "#ff4444";
        }
      } catch (e) {
        status.innerText = "Error. Check internet or rules.";
        console.error(e);
      }
    };
  </script>
