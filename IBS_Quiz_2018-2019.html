<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBS_Quiz_2018-2019</title>

    <style>
       :root {
            --bg-body: #121212;
            --text-main: #f1f5f9;
            --text-opts: #f1f5f9;
            --header-bg: #1e293b;
            --header-text: #38bdf8;
            --border-color: #26292b;
            --input-bg: #1a1c1e;
            --input-border: #2a2f36;
            --ans-bg: #1e293b;
            --ans-text: #f0cf6a;
            --filter-bg: transparent;
            
        }

        [data-theme="light"] {
            --bg-body: #ffffff;
            --text-main: #000000;
            --text-opts: #333333;
            --header-bg: #333333;
            --header-text: #ffffff;
            --border-color: #e0e0e0;
            --input-bg: #ffffff;
            --input-border: #cccccc;
            --ans-bg: #eef6e4;
            --ans-text: #2e7d32;
            --filter-bg: transparent;
            
        }

        .filter-btn.active {
            background-color: #728fcf;
            color: #fff;
            border-color:  #728fcf;
        }

        body {
            -webkit-user-select: none;
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            transition: background-color 0.3s ease;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 1150px;
            padding: 20px;
            box-sizing: border-box;
        }

        .header { 
            text-align: center; 
            margin-bottom: 15px;
            background-color: var(--header-bg);
            color: var(--header-text);
            padding: 50px;
           min-height: 35px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .controls-row { display: flex; gap: 12px; margin-bottom: 10px; }

        .search-wrapper {
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
        }

        .search-wrapper svg {
            position: absolute;
            left: 12px;
            color: var(--text-opts);
            z-index: 1;
        }

        #search-input {
            width: 100%;
            padding: 10px 10px 10px 40px;
            font-size: 1.1rem;
            border: 1px solid var(--input-border);
            background-color: var(--input-bg);
            color: var(--text-main);
            border-radius: 7px;
            outline: none;
        }

        .theme-toggle {
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-main);
            width: 44px;
            height: 44px;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .filter-container {
            background: transparent;
            border: none;
            padding: 0;
            margin-bottom: 10px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            overflow-y: hidden;
            flex-wrap: nowrap;
            max-width: 100%;
            box-sizing: border-box;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .filter-container::-webkit-scrollbar { display: none; }

        /* Subject picker dropdown */
        .subject-toggle-wrapper {
            position: relative;
            display: inline-block;
        }

        .subject-toggle {
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-main);
            width: 42px;
            height: 42px;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .subject-toggle svg {
            stroke: none !important;
            fill: var(--text-main);
            pointer-events: none;
        }

        .subject-toggle.dropdown-open {
            border-color: rgba(255,255,255,0.3);
            background: rgba(40, 42, 45, 0.9);
        }

        .subject-toggle.dropdown-open svg { fill: var(--text-main); }

        [data-theme="light"] .subject-toggle.dropdown-open {
            border-color: #121212;
            background: rgba(255,255,255,1);
        }

        .subject-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: #111111;
            border: 1px solid rgba(255,255,255,0.13);
            border-radius: 14px;
            overflow: hidden;
            min-width: 210px;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transform: translateY(-6px) scale(0.97);
            transition: opacity 0.22s ease, transform 0.22s ease;
            box-shadow: 0 16px 48px rgba(0,0,0,0.65);
        }

        .subject-dropdown.open {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: all;
        }

        [data-theme="light"] .subject-dropdown {
            background: #ffffff;
            border-color: rgba(0,0,0,0.13);
            box-shadow: 0 16px 48px rgba(0,0,0,0.15);
        }

        .subject-dropdown-header {
            padding: 14px 16px 10px;
            font-size: 0.72rem;
            font-weight: 700;
            color: #555;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        [data-theme="light"] .subject-dropdown-header {
            border-bottom-color: rgba(0,0,0,0.08);
            color: #999;
        }

        .subject-dropdown-item {
            display: flex;
            align-items: center;
            gap: 11px;
            padding: 13px 16px;
            font-size: 0.88rem;
            font-weight: 700;
            color: #aaa;
            transition: background 0.15s ease, color 0.15s ease;
            user-select: none;
            cursor: pointer;
            text-align: left;
        }

        [data-theme="light"] .subject-dropdown-item { color: #666; }

        .subject-dropdown-item:not(:last-child) {
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        [data-theme="light"] .subject-dropdown-item:not(:last-child) {
            border-bottom-color: rgba(0,0,0,0.06);
        }

        .subject-dropdown-item:hover {
            background: rgba(255,255,255,0.06);
            color: #e2e8f0;
        }

        [data-theme="light"] .subject-dropdown-item:hover {
            background: rgba(0,0,0,0.04);
            color: #111;
        }

        .subject-dropdown-item.selected { color: #f1f5f9; }

        [data-theme="light"] .subject-dropdown-item.selected { color: #111; }

        .filter-option-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            border: 1.5px solid rgba(255,255,255,0.25);
            flex-shrink: 0;
            transition: background 0.15s ease, border-color 0.15s ease;
        }

        [data-theme="light"] .filter-option-dot { border-color: rgba(0,0,0,0.2); }

        .subject-dropdown-item.selected .filter-option-dot {
            background: #f1f5f9;
            border-color: #f1f5f9;
        }

        [data-theme="light"] .subject-dropdown-item.selected .filter-option-dot {
            background: #111;
            border-color: #111;
        }

        .controls-row { position: relative; }

        .filter-btn {
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-main);
            padding: 9px 16px;
            border-radius: 6px;
            font-size: 0.84rem;
            font-weight: 700;
            transition: all 0.2s;
            flex: 0 0 auto;
            white-space: nowrap;
            margin-bottom: 10px;
            margin-top: 6px;
        }

        .divider { border: none; margin-bottom: 12px; }

        .q-block {
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 30px;
        }

        .q-block:last-child { border-bottom: none; }
        .q-text { font-size: 1.15rem; font-weight: 600; margin-bottom: 12px; line-height: 1.5; }
        .opts { list-style-type: none; padding: 0; line-height: 1.7; font-size: 1.05rem; color: var(--text-opts); margin-bottom: 15px; }

        .ans-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ans-btn {
            background-color: #728fcf;
            color: #fff;
            border: none;
            padding: 7px 20px;
            border-radius: 4px;
            margin-top: 20px;
            font-weight: 650;
            font-size: 16px;
            transition: background-color 0.2s, color 0.2s;

        }

        .q-block.revealed .ans-btn {
            background-color: var(--ans-bg);
            color: var(--ans-text);
            font-weight: 700;
            padding: 7px 12px;
            font-size: 16px;
        }

        mark { background-color: #f0cf6a; color: #000; }

        .section-heading {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 14px;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border-color);
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-opts);
            font-size: 1.15rem;
            font-weight: 500;
            opacity: 0.6;
            box-sizing: border-box;
            width: 100%;
            display: block; 
        }

        .section-heading-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .mcq-count-badge {
            font-size: 0.70rem;
            font-weight: 700;
            color: var(--text-main);
            border: 1px solid var(--text-main);
            padding: 2px 5px;
            border-radius: 3px;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }
    </style>

</head>

  { "n": 16, "s": "Biochemistry", "l": 2, "q": "Free fatty acids are transported in the blood:", "o": ["A. Combined with albumin", "B. Combined with fatty acid binding protein", "C. Combined with β-lipoprotein", "D. In unbound free salts", "E. Combined with hormones"], "a": "A" },
  { "n": 17, "s": "Biochemistry", "l": 2, "q": "TGs present in plasma lipoproteins can be hydrolyzed by:", "o": ["A. Hormone-sensitive lipase", "B. Pancreatic lipase", "C. Heparin", "D. Lipoprotein lipase", "E. Phospholipase"], "a": "D" },
  { "n": 18, "s": "Biochemistry", "l": 2, "q": "Which of the following steps in the activation of fatty acid is thought to be rate controlling and locus of metabolic regulation?", "o": ["A. 3-hydroxy 3-methylglutaryl-CoA to mevalonic acid", "B. Squaline to TGs", "C. Squaline to lanosterol", "D. Lanosterol to cholesterol", "E. Squaline to cholesterol"], "a": "A" },
  { "n": 19, "s": "Biochemistry", "l": 2, "q": "Oxidation of phytanic acid can not take place with out prior oxidation, which of the following statements best explains the requirement for α-oxidation?", "o": ["A. The β carbon is blocked by a methyl group", "B. Cannot activated by CoA prior to β-oxidation", "C. The chain length of pytanic acid is too long for the mitochondrial β-oxidation", "D. Require CoA intermediate", "E. The α-carbon is blocked by a methyl group"], "a": "A" },
  { "n": 20, "s": "Biochemistry", "l": 2, "q": "Lipotropic factors like:", "o": ["A. Betaine", "B. Alcohol", "C. Acitic acid", "D. Cholesterol", "E. TGs"], "a": "A" }

];


const lectures = {
   1:  "Protein Metabolism 🥩",
   2:  "Lipid Metabolism 🥑",

};
  
const lectureFilters = {
    "All": [
        { label: "All", val: "All" }
    ],
    "Biochemistry": [
        { label: "All",                            val: "All" },
        
        { label: "Protein Metabolism 🥩",     val: 1 },
        { label: "Lipid Metabolism 🥑",     val: 2 },
      
    ],
    
};

let currentSubjectFilter = "Biochemistry";  // default
let currentLecture = "All";

const container = document.getElementById('quiz-content');
const filterBar = document.getElementById('filter-bar');

function renderFilterBar() {
    const filters = lectureFilters[currentSubjectFilter] || lectureFilters["All"];
    filterBar.innerHTML = filters.map(f =>
        `<button class="filter-btn${f.val === currentLecture ? " active" : ""}" onclick="filterByLecture('${f.val}', this)">${f.label}</button>`
    ).join('');
}

function getLectureLabel(val) {
    if (val === "All" && currentSubjectFilter === "All") return "All";
    if (val === "All") {
        const subjectLabels = { "Biochemistry": "Biochemistry 🧪", "Pharmacology": "Pharmacology 💊", "Immunology": "Immunology 🛡️" };
        return subjectLabels[currentSubjectFilter] || currentSubjectFilter;
    }
    return lectures[val] || val;
}

function updateSectionHeading() {
    const existing = document.getElementById('section-heading');
    const visibleBlocks = [...document.querySelectorAll('.q-block')].filter(b => b.style.display !== "none");
    const count = visibleBlocks.length;

    let noResultsMsg = document.getElementById('no-results-msg');
    if (count === 0) {
        if (!noResultsMsg) {
            noResultsMsg = document.createElement('div');
            noResultsMsg.id = 'no-results-msg';
            noResultsMsg.className = 'no-results';
            noResultsMsg.textContent = "No questions found.";
            container.appendChild(noResultsMsg);
        }
    } else if (noResultsMsg) {
        noResultsMsg.remove();
    }

    const label = getLectureLabel(currentLecture);
    const badgeText = count === 1 ? "1 MCQ" : `${count} MCQs`;

    if (existing) {
        existing.style.display = (count === 0) ? "none" : "flex";
        existing.querySelector('.section-heading-title').textContent = label;
        existing.querySelector('.mcq-count-badge').textContent = badgeText;
    } else if (count > 0) {
        const heading = document.createElement('div');
        heading.id = 'section-heading';
        heading.className = 'section-heading';
        heading.innerHTML = `<span class="section-heading-title">${label}</span><span class="mcq-count-badge">${badgeText}</span>`;
        container.insertBefore(heading, container.firstChild);
    }
}

function renderQuiz() {
    container.innerHTML = '';
    allQuestions.forEach(item => {
        const div = document.createElement('div');
        div.className = 'q-block';
        div.dataset.subject = item.s;
        div.dataset.lecture = item.l ?? "";
        div.dataset.searchText = (item.q + " " + item.o.join(" ")).toLowerCase();

        div.style.display = matchesFilters(item) ? "block" : "none";

        div.innerHTML = `
            <div class="q-text" data-original="${item.n}. ${item.q}">${item.n}. ${item.q}</div>
            <ul class="opts">
                ${item.o.map(opt => `<li data-original="${opt}">${opt}</li>`).join('')}
            </ul>
            <div class="ans-row">
                <button class="ans-btn" data-answer="Answer: ${item.a}" onclick="toggleAnswer(this)">Answer</button>
            </div>
        `;
        container.appendChild(div);
    });
    updateSectionHeading();
}

function matchesFilters(item) {
    const subjectOk = currentSubjectFilter === "All" || item.s === currentSubjectFilter;
    const lectureOk = currentLecture === "All" || item.l === currentLecture;
    return subjectOk && lectureOk;
}

function filterByLecture(val, btn) {
    currentLecture = val;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    handleSearch();
}

// Subject dropdown logic
function toggleSubjectDropdown() {
    const dd = document.getElementById('subject-dropdown');
    const btn = document.getElementById('subject-toggle-btn');
    const isOpen = dd.classList.contains('open');
    if (isOpen) {
        dd.classList.remove('open');
        btn.classList.remove('dropdown-open');
    } else {
        dd.classList.add('open');
        btn.classList.add('dropdown-open');
    }
}

function selectSubjectFilter(subject, el) {
    currentSubjectFilter = subject;
    currentLecture = "All";
    localStorage.setItem('selectedSubject', subject);
    // update selected state in dropdown
    document.querySelectorAll('.subject-dropdown-item').forEach(i => i.classList.remove('selected'));
    el.classList.add('selected');
    // keep dropdown open — do NOT close it
    // re-render filter bar and quiz
    renderFilterBar();
    handleSearch();
}

// Close dropdown when clicking outside
document.addEventListener('click', function(e) {
    const wrapper = document.querySelector('.subject-toggle-wrapper');
    if (wrapper && !wrapper.contains(e.target)) {
        document.getElementById('subject-dropdown').classList.remove('open');
        document.getElementById('subject-toggle-btn').classList.remove('dropdown-open');
    }
});

function handleSearch() {
    const term = document.getElementById('search-input').value.toLowerCase();
    const blocks = document.querySelectorAll('.q-block');
    blocks.forEach(block => {
        resetBlock(block);
        const subjectOk = currentSubjectFilter === "All" || block.dataset.subject === currentSubjectFilter;
        const lectureOk = currentLecture === "All" || String(block.dataset.lecture) === String(currentLecture);
        const matchesSearch = term === "" || block.dataset.searchText.includes(term);
        if (subjectOk && lectureOk && matchesSearch) {
            block.style.display = "block";
            if (term !== "") highlight(block, term);
        } else {
            block.style.display = "none";
        }
    });
    updateSectionHeading();
}

function resetBlock(block) {
    const qText = block.querySelector('.q-text');
    const opts = block.querySelectorAll('li');
    qText.innerHTML = qText.dataset.original;
    opts.forEach(li => li.innerHTML = li.dataset.original);
    block.classList.remove('revealed');
    const btn = block.querySelector('.ans-btn');
    if (btn && btn.dataset.answer) btn.textContent = 'Answer';
}

function highlight(block, term) {
    const regex = new RegExp(`(${term})`, 'gi');
    block.querySelector('.q-text').innerHTML = block.querySelector('.q-text').innerHTML.replace(regex, '<mark>$1</mark>');
    block.querySelectorAll('li').forEach(li => li.innerHTML = li.innerHTML.replace(regex, '<mark>$1</mark>'));
}

function toggleAnswer(btn) {
    const block = btn.closest('.q-block');
    const isRevealed = block.classList.toggle('revealed');
    btn.textContent = isRevealed ? btn.dataset.answer : 'Answer';
}

function toggleTheme() {
    const isLight = document.body.getAttribute('data-theme') === 'light';
    const newTheme = isLight ? '' : 'light';
    document.body.setAttribute('data-theme', newTheme);
    localStorage.setItem('theme', newTheme);
    document.getElementById('theme-icon').innerHTML = isLight 
        ? '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>'
        : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
}

(function () {
    if (localStorage.getItem('theme') === 'light') {
        document.body.setAttribute('data-theme', 'light');
        document.getElementById('theme-icon').innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
    }
    // Restore saved subject (default: Biochemistry)
    const saved = localStorage.getItem('selectedSubject');
    if (saved && lectureFilters[saved]) {
        currentSubjectFilter = saved;
    }
    // Mark the correct dropdown item as selected
    document.querySelectorAll('.subject-dropdown-item').forEach(item => {
        if (item.dataset.subject === currentSubjectFilter) {
            item.classList.add('selected');
        } else {
            item.classList.remove('selected');
        }
    });
}());

renderFilterBar();
renderQuiz();
</script>
</body>
</html>
